name: ctx CI

# Scoped to the ctx greenfield packages so it never disturbs the legacy tk `CI`
# workflow (.github/workflows/ci.yml). Path filters keep it quiet for tk-only
# changes; the two workflows are independent.
on:
  push:
    # feat/1.0.0 is the M1 integration branch: the reviewer merges slice branches
    # locally and pushes, so integration pushes must run 3-OS CI (M1 exit item 2).
    # m1/** covers direct pushes to slice branches without an open PR.
    branches: [main, "feat/1.0.0", "m1/**"]
    paths:
      - "packages/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ctx-ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ctx-ci.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      # node:sqlite is flag-gated on Node 22.5–22.12 (unflagged from 22.13);
      # the flag is an accepted no-op on later versions, and NODE_OPTIONS
      # propagates it to vitest workers and spawned child processes alike.
      NODE_OPTIONS: --experimental-sqlite
    # Hard ceiling so a wedged spawn test can never pin a runner.
    timeout-minutes: 20
    strategy:
      # Keep every platform's result in one run, not just the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # ctx targets Node >=22.16: 22.5's initial node:sqlite build lacks
        # FTS5 ("no such module: fts5", observed on all 3 OSes in run
        # 28700997273) — verified against nodejs/node deps/sqlite/unofficial.gni per tag:
        # v22.16.0 is the FIRST 22.x that compiles SQLite with FTS5 (22.13-15
        # do not). Pin the floor so accidental use of a newer-Node API is
        # caught.
        node-version: ["22.16"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" typecheck
      # `vitest run` bounds itself; the step-level timeout-minutes is the backstop.
      - run: pnpm -r --filter "./packages/*" test
