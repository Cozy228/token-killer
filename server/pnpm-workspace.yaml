# Make server/ a self-contained pnpm workspace, isolated from the CLI root (which
# is intentionally zero-dependency). pnpm uses the nearest workspace file, so
# installs under server/ never touch the CLI's tree.
packages:
  - app
allowBuilds:
  esbuild: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-secrets-manager@3.1063.0 || 3.1081.0'
  - '@aws-sdk/core@3.974.18 || 3.974.29'
  - '@aws-sdk/credential-provider-env@3.972.44 || 3.972.55'
  - '@aws-sdk/credential-provider-http@3.972.46 || 3.972.57'
  - '@aws-sdk/credential-provider-ini@3.972.50 || 3.972.62'
  - '@aws-sdk/credential-provider-login@3.972.49 || 3.972.61'
  - '@aws-sdk/credential-provider-node@3.972.52 || 3.972.64'
  - '@aws-sdk/credential-provider-process@3.972.44 || 3.972.55'
  - '@aws-sdk/credential-provider-sso@3.972.49 || 3.972.61'
  - '@aws-sdk/credential-provider-web-identity@3.972.49 || 3.972.61'
  - '@aws-sdk/nested-clients@3.997.17 || 3.997.29'
  - '@aws-sdk/signature-v4-multi-region@3.996.32'
  - '@aws-sdk/token-providers@3.1063.0 || 3.1081.0'
  - '@aws-sdk/types@3.973.11'
  - '@aws-sdk/xml-builder@3.972.28'
