#cloud-config
# Base cloud-init for tg (token-guard) benchmark-session VMs — Ubuntu 24.04.
#
# Default startup config used by scripts/benchmark-sessions/lib/runner.py when no
# explicit cloud-init is provided. Installs Node.js, pnpm, git, and the Claude
# Code CLI so both "tg ON" and "tg OFF" VMs can run benchmark sessions. The ON
# VMs additionally run setup-tg.sh to build/enable tg and its rewrite hook.

package_update: true
package_upgrade: false

packages:
  - curl
  - wget
  - git
  - jq
  - build-essential
  - python3
  - python3-pip
  - python3-venv

runcmd:
  # ── Node.js 22 + pnpm ──
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - npm install -g pnpm

  # ── Claude Code CLI ──
  - npm install -g @anthropic-ai/claude-code

  # ── terminal-bench harness (optional precision tests) ──
  - su - ubuntu -c 'pip3 install --break-system-packages terminal-bench || true'

  # ── Signal completion ──
  - touch /home/ubuntu/.cloud-init-complete
  - chown ubuntu:ubuntu /home/ubuntu/.cloud-init-complete

final_message: "tg benchmark-session VM ready in $UPTIME seconds"
